name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Main Application ──
jobs:
  main:
    name: Main App (lint, test, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  # ── Migration Validation (Supabase CLI) ──
  migrations:
    name: Migration validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.12

      - name: Start Supabase and apply migrations
        run: |
          set -o pipefail
          supabase start --workdir supabase

      - name: Verify migrations applied
        run: |
          set -o pipefail
          PGURL=$(supabase status --workdir supabase | grep "DB URL" | awk '{print $NF}')
          if [ -z "$PGURL" ]; then
            echo "❌ Could not get database URL from supabase status"
            exit 1
          fi

          TABLES=$(psql "$PGURL" -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public'" 2>/dev/null | tr -d ' ')
          echo "Public tables: $TABLES"

          if [ "$TABLES" -lt 10 ]; then
            echo "❌ Expected at least 10 public tables, found $TABLES"
            exit 1
          fi

          # Verify critical financial tables exist
          for table in businesses payments platform_fees business_payouts payout_accounts refunds invoices; do
            EXISTS=$(psql "$PGURL" -t -c "SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='$table'" 2>/dev/null | tr -d ' ')
            if [ "$EXISTS" != "1" ]; then
              echo "❌ Missing table: $table"
              exit 1
            fi
          done

          echo "✅ All migrations applied, key tables verified."

      - name: Verify RLS enabled on financial tables
        run: |
          set -o pipefail
          PGURL=$(supabase status --workdir supabase | grep "DB URL" | awk '{print $NF}')
          for table in payments platform_fees business_payouts payout_accounts refunds invoices; do
            RLS=$(psql "$PGURL" -t -c "SELECT rowsecurity FROM pg_tables WHERE tablename='$table' AND schemaname='public'" 2>/dev/null | tr -d ' ')
            if [ "$RLS" != "t" ]; then
              echo "❌ RLS not enabled on: $table"
              exit 1
            fi
          done
          echo "✅ RLS enabled on all financial tables."

      - name: Stop Supabase
        if: always()
        run: supabase stop --workdir supabase 2>/dev/null || true

  # ── Admin Application ──
  admin:
    name: Admin App (install, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Typecheck admin
        working-directory: admin
        run: npm run typecheck

      - name: Build admin
        working-directory: admin
        run: npm run build

  # ── Playwright Smoke Tests ──
  playwright:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: main

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start server and run tests
        run: |
          npx next start &
          SERVER_PID=$!
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          # Run only chromium (faster CI, mobile is supplementary)
          npx playwright test e2e/smoke.spec.ts --project=chromium --reporter=list
          TEST_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $TEST_EXIT

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/

  # ── Dependency Audit ──
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=critical

      - name: Check for wildcard dependencies
        run: |
          echo "Checking for wildcard (*) dependencies..."
          if grep -E ':\s*"\*"' package.json admin/package.json 2>/dev/null; then
            echo "❌ Wildcard dependencies found. Pin to specific versions."
            exit 1
          fi
          echo "✅ No wildcard dependencies."

  # ── Secret Scanning ──
  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0
          # These patterns detect live credential prefixes.
          # Exclusions: this workflow (contains the pattern list), pre-commit hook
          # (mirrors the same list), and agent skill docs (contain example prefixes).
          # If a real secret is added to an excluded file, it must be caught by
          # pre-commit or code review — not by excluding the file from scanning.
          PATTERNS=(
            'sk_live_'
            'pk_live_'
            'FLWSECK_'
            'sq0atp-'
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVC'
            'sbp_'
            'xoxb-'
            'ghp_'
          )
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git grep -l "$pattern" -- ':!.env.example' ':!node_modules' ':!.next' ':!*.lock' ':!.github/workflows/ci.yml' ':!.husky/pre-commit' ':!.agents/skills/*/references/*' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️  Found potential secret pattern '$pattern' in:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "❌ Potential secrets found. Please review."
            exit 1
          fi
          echo "✅ No secrets detected."
