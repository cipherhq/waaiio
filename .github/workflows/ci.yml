name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Main Application ──
  main-app:
    name: Main App (lint, test, build)
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
      NEXT_PUBLIC_APP_URL: https://www.waaiio.com
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: pk_test_dummy
      NEXT_PUBLIC_POSTHOG_KEY: dummy
      NEXT_PUBLIC_META_APP_ID: dummy
      NEXT_PUBLIC_SENTRY_DSN: https://dummy@sentry.io/0
      SENTRY_DSN: https://dummy@sentry.io/0
      SENTRY_ORG: dummy
      SENTRY_PROJECT: dummy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npx next build

  # ── Admin Application ──
  admin-app:
    name: Admin App (install, build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Migration Validation ──
  migrations:
    name: Migration syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate SQL migrations are parseable
        run: |
          for f in supabase/migrations/*.sql; do
            echo "Checking $f..."
            # Basic syntax check: ensure no common errors
            if grep -qP '^\s*(DROP\s+TABLE|TRUNCATE)\s' "$f"; then
              echo "WARNING: $f contains DROP TABLE or TRUNCATE"
            fi
          done
          echo "All migrations checked."
