name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Main Application ──
  main-app:
    name: Main App (lint, test, build)
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
      NEXT_PUBLIC_APP_URL: https://www.waaiio.com
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: pk_test_dummy
      NEXT_PUBLIC_POSTHOG_KEY: dummy
      NEXT_PUBLIC_META_APP_ID: dummy
      NEXT_PUBLIC_SENTRY_DSN: https://dummy@sentry.io/0
      SENTRY_DSN: https://dummy@sentry.io/0
      SENTRY_ORG: dummy
      SENTRY_PROJECT: dummy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npx next build

  # ── Admin Application ──
  admin-app:
    name: Admin App (install, build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Migration Validation (real PostgreSQL) ──
  migrations:
    name: Migration validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: waaiio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Create Supabase schema prerequisites
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: waaiio_test
        run: |
          # Create the auth schema and functions that Supabase provides
          psql -q -v ON_ERROR_STOP=1 <<'EOSQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE SCHEMA IF NOT EXISTS extensions;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          CREATE EXTENSION IF NOT EXISTS pgcrypto;

          -- Minimal auth.uid() stub for RLS policies
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS UUID AS $$
            SELECT '00000000-0000-0000-0000-000000000000'::UUID;
          $$ LANGUAGE SQL STABLE;

          -- Minimal auth.role() stub
          CREATE OR REPLACE FUNCTION auth.role() RETURNS TEXT AS $$
            SELECT 'authenticated'::TEXT;
          $$ LANGUAGE SQL STABLE;

          -- Create a minimal auth.users table (referenced by some FKs)
          CREATE TABLE IF NOT EXISTS auth.users (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            email TEXT,
            raw_app_meta_data JSONB DEFAULT '{}'
          );

          -- Supabase roles: required by GRANT/REVOKE in migrations
          -- 137, 176, 181, 233, 244 (GRANT EXECUTE ... TO service_role)
          -- 003, 017, 018, 023 (RLS policies using auth.role() = 'service_role')
          DO $$ BEGIN CREATE ROLE service_role; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE authenticated; EXCEPTION WHEN duplicate_object THEN NULL; END $$;
          DO $$ BEGIN CREATE ROLE anon; EXCEPTION WHEN duplicate_object THEN NULL; END $$;

          -- Realtime publication: required by ALTER PUBLICATION in migrations
          -- 001 (reservations), 020 (chat_messages), 025 (chat_conversations), 110 (queue_entries)
          -- Note: CREATE PUBLICATION IF NOT EXISTS requires PG16+; CI uses PG15
          DO $$ BEGIN CREATE PUBLICATION supabase_realtime; EXCEPTION WHEN duplicate_object THEN NULL; END $$;

          -- Storage schema: required by bucket/object policies in migrations
          -- 018 (customer-reports bucket), 033 (business-documents bucket)
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE TABLE IF NOT EXISTS storage.buckets (
            id TEXT PRIMARY KEY,
            name TEXT NOT NULL,
            public BOOLEAN DEFAULT false,
            created_at TIMESTAMPTZ DEFAULT NOW(),
            updated_at TIMESTAMPTZ DEFAULT NOW()
          );
          CREATE TABLE IF NOT EXISTS storage.objects (
            id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
            bucket_id TEXT REFERENCES storage.buckets(id),
            name TEXT,
            owner UUID,
            created_at TIMESTAMPTZ DEFAULT NOW(),
            updated_at TIMESTAMPTZ DEFAULT NOW()
          );
          ALTER TABLE storage.objects ENABLE ROW LEVEL SECURITY;

          -- Supabase storage helper function used in bucket policies (migration 133)
          CREATE OR REPLACE FUNCTION storage.foldername(name TEXT)
          RETURNS TEXT[] AS $$
            SELECT string_to_array(name, '/');
          $$ LANGUAGE SQL IMMUTABLE;
          EOSQL
          echo "✅ Supabase schema stubs created"

      - name: Apply all migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: waaiio_test
        run: |
          FAILED=0
          APPLIED=0
          for f in supabase/migrations/*.sql; do
            echo "Applying $(basename $f)..."
            if ! psql -q -v ON_ERROR_STOP=1 -f "$f" 2>&1; then
              echo "❌ FAILED: $(basename $f)"
              FAILED=1
              # Continue to catch multiple failures
            else
              APPLIED=$((APPLIED + 1))
            fi
          done
          echo ""
          echo "Applied: $APPLIED migrations"
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Some migrations failed. See errors above."
            exit 1
          fi
          echo "✅ All migrations applied successfully."

      - name: Verify key tables exist
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: waaiio_test
        run: |
          echo "Verifying key tables..."
          TABLES="businesses bookings payments orders products events event_tickets attendance_log whatsapp_channels processed_webhook_events"
          MISSING=0
          for t in $TABLES; do
            if psql -tAc "SELECT 1 FROM information_schema.tables WHERE table_name='$t'" | grep -q 1; then
              echo "  ✅ $t"
            else
              echo "  ❌ $t MISSING"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "❌ Some expected tables are missing."
            exit 1
          fi
          echo "✅ All key tables verified."

      - name: Verify RLS is enabled
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: waaiio_test
        run: |
          echo "Checking RLS on user-facing tables..."
          NO_RLS=$(psql -tAc "
            SELECT tablename FROM pg_tables
            WHERE schemaname = 'public'
            AND tablename NOT IN ('schema_migrations', 'spatial_ref_sys')
            AND tablename NOT IN (
              SELECT tablename FROM pg_tables t
              JOIN pg_class c ON c.relname = t.tablename
              WHERE c.relrowsecurity = true
            )
          ")
          if [ -n "$NO_RLS" ]; then
            echo "⚠️  Tables without RLS (may be intentional):"
            echo "$NO_RLS"
          fi
          echo "✅ RLS check complete."

  # ── Playwright Smoke Tests ──
  playwright:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: main-app

    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: pk_test_dummy
      NEXT_PUBLIC_POSTHOG_KEY: dummy
      NEXT_PUBLIC_META_APP_ID: dummy
      NEXT_PUBLIC_SENTRY_DSN: https://dummy@sentry.io/0
      SENTRY_DSN: https://dummy@sentry.io/0
      SENTRY_ORG: dummy
      SENTRY_PROJECT: dummy
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npx next build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start server and run tests
        run: |
          npx next start &
          SERVER_PID=$!
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          # Run only chromium (faster CI, mobile is supplementary)
          npx playwright test e2e/smoke.spec.ts --project=chromium --reporter=list
          TEST_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $TEST_EXIT

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Secret Scanning ──
  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0
          PATTERNS=(
            'sk_live_'
            'pk_live_'
            'FLWSECK_'
            'sq0atp-'
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVC'
            'sbp_'
            'xoxb-'
            'ghp_'
          )
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git grep -l "$pattern" -- ':!.env.example' ':!node_modules' ':!.next' ':!*.lock' ':!.github/workflows/ci.yml' ':!.husky/pre-commit' ':!.agents/skills/*/references/*' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️  Found potential secret pattern '$pattern' in:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "❌ Potential secrets found. Please review."
            exit 1
          fi
          echo "✅ No secrets detected."

  # ── Dependency Audit ──
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Check for wildcard dependencies
        run: |
          echo "Checking for wildcard (*) dependencies..."
          if grep -E ':\s*"\*"' package.json admin/package.json 2>/dev/null; then
            echo "❌ Wildcard dependencies found. Pin to specific versions."
            exit 1
          fi
          echo "✅ No wildcard dependencies."
