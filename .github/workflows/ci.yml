name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Main Application ──
jobs:
  main:
    name: Main App (lint, test, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  # ── Migration Validation (Supabase CLI) ──
  migrations:
    name: Migration validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Start Supabase and apply migrations
        run: |
          set -o pipefail
          echo "Supabase CLI version:"
          supabase --version
          echo ""
          echo "Starting Supabase (DB only)..."
          supabase start -x gotrue,realtime,storage-api,imgproxy,mailpit,postgrest,edge-runtime,logflare,vector,supavisor

      - name: Verify migrations applied
        run: |
          set -o pipefail
          # Get DB URL from structured env output
          eval "$(supabase status -o env 2>/dev/null)" || true
          PGURL="${DB_URL:-${POSTGRES_URL:-}}"
          if [ -z "$PGURL" ]; then
            echo "❌ Could not get database URL"
            supabase status -o env
            exit 1
          fi
          echo "DB URL obtained successfully"

          # Count SQL migration files versus applied migrations
          FILE_COUNT=$(ls -1 supabase/migrations/*.sql 2>/dev/null | wc -l | tr -d ' ')
          APPLIED=$(psql "$PGURL" -t -c "SELECT COUNT(*) FROM supabase_migrations.schema_migrations" | tr -d ' ')
          echo "Migration files: $FILE_COUNT"
          echo "Applied migrations: $APPLIED"

          if [ "$APPLIED" -lt "$FILE_COUNT" ]; then
            echo "⚠️  Not all migrations applied: $APPLIED of $FILE_COUNT"
            echo "Missing:"
            psql "$PGURL" -t -c "
              SELECT '  ' || v.version FROM (
                SELECT regexp_replace(f, '^0*', '') AS version
                FROM unnest(ARRAY[$(ls -1 supabase/migrations/*.sql | xargs -I{} basename {} .sql | sed "s/_.*//;s/^/'/" | sed "s/$/'/" | tr '\n' ',' | sed 's/,$//')]) AS f
              ) v
              WHERE v.version NOT IN (SELECT version FROM supabase_migrations.schema_migrations)
              ORDER BY v.version::integer
              LIMIT 20
            " 2>/dev/null || echo "  (could not determine missing versions)"
            exit 1
          fi

          # Verify latest applied is 249
          LATEST=$(psql "$PGURL" -t -c "SELECT MAX(version::integer) FROM supabase_migrations.schema_migrations" | tr -d ' ')
          echo "Latest applied migration: $LATEST"
          if [ "$LATEST" != "280" ]; then
            echo "❌ Expected latest migration 280, got $LATEST"
            exit 1
          fi

          # Verify critical financial tables exist
          for table in businesses payments platform_fees business_payouts payout_accounts refunds invoices package_session_log; do
            EXISTS=$(psql "$PGURL" -t -c "SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='$table'" | tr -d ' ')
            if [ "$EXISTS" != "1" ]; then
              echo "❌ Missing table: $table"
              exit 1
            fi
          done

          echo "✅ All $APPLIED migrations applied. Key tables verified."

      - name: Verify RLS enabled on financial tables
        run: |
          set -o pipefail
          eval "$(supabase status -o env 2>/dev/null)" || true
          PGURL="${DB_URL:-${POSTGRES_URL:-}}"
          for table in payments platform_fees business_payouts payout_accounts refunds invoices; do
            RLS=$(psql "$PGURL" -t -c "SELECT rowsecurity FROM pg_tables WHERE tablename='$table' AND schemaname='public'" | tr -d ' ')
            if [ "$RLS" != "t" ]; then
              echo "❌ RLS not enabled on: $table"
              exit 1
            fi
          done
          echo "✅ RLS enabled on all financial tables."

      - name: Stop Supabase
        if: always()
        run: supabase stop 2>/dev/null || true

  # ── Admin Application ──
  admin:
    name: Admin App (install, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Typecheck admin
        working-directory: admin
        run: npm run typecheck

      - name: Build admin
        working-directory: admin
        run: npm run build

  # ── Playwright Smoke Tests ──
  playwright:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: [main, migrations]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Start Supabase
        run: supabase start -x imgproxy,edge-runtime,logflare,vector,supavisor

      - name: Install dependencies
        run: npm ci

      - name: Get Supabase env
        id: supabase
        run: |
          eval "$(supabase status -o env 2>/dev/null)" || true
          echo "url=${API_URL:-http://localhost:54321}" >> "$GITHUB_OUTPUT"
          echo "anon_key=${ANON_KEY:-}" >> "$GITHUB_OUTPUT"
          echo "service_key=${SERVICE_ROLE_KEY:-}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start server and run tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: |
          npx next start &
          SERVER_PID=$!
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          # Run only chromium (faster CI, mobile is supplementary)
          npx playwright test e2e/smoke.spec.ts --project=chromium --reporter=list
          TEST_EXIT=$?
          kill $SERVER_PID 2>/dev/null || true
          exit $TEST_EXIT

      - name: Run JWT/RLS integration tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/supabase-auth-integration.test.ts --reporter=verbose

      - name: Run payment idempotency database tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/payment-idempotency-db.test.ts --reporter=verbose

      - name: Run payout safety database tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/payout-safety-db.test.ts --reporter=verbose

      - name: Run payout handler integration tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/payout-handler-integration.test.ts --reporter=verbose

      - name: Run OTP concurrency tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/otp-concurrency.test.ts --reporter=verbose

      - name: Run campaign lock trigger tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/campaign-lock-db.test.ts --reporter=verbose

      - name: Run invoice token security tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/invoice-token-security.test.ts --reporter=verbose

      - name: Run booking and order journey tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/booking-order-journey.test.ts --reporter=verbose

      - name: Run capability and tier enforcement tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/capability-tier-enforcement.test.ts --reporter=verbose

      - name: Run event and membership journey tests
        env:
          SUPABASE_INTEGRATION: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_key }}
        run: npx vitest run lib/__tests__/event-membership-journey.test.ts --reporter=verbose

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/

      - name: Stop Supabase
        if: always()
        run: supabase stop 2>/dev/null || true

  # ── Dependency Audit ──
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit root dependencies
        run: npm audit --audit-level=critical

      - name: Check for wildcard dependencies
        run: |
          echo "Checking for wildcard (*) dependencies..."
          if grep -E ':\s*"\*"' package.json admin/package.json 2>/dev/null; then
            echo "❌ Wildcard dependencies found. Pin to specific versions."
            exit 1
          fi
          echo "✅ No wildcard dependencies."

  # ── Secret Scanning ──
  secrets:
    name: Secret scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0
          # These patterns detect live credential prefixes.
          # Exclusions: this workflow (contains the pattern list), pre-commit hook
          # (mirrors the same list), and agent skill docs (contain example prefixes).
          # If a real secret is added to an excluded file, it must be caught by
          # pre-commit or code review — not by excluding the file from scanning.
          PATTERNS=(
            'sk_live_'
            'pk_live_'
            'FLWSECK_'
            'sq0atp-'
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVC'
            'sbp_'
            'xoxb-'
            'ghp_'
          )
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git grep -l "$pattern" -- ':!.env.example' ':!node_modules' ':!.next' ':!*.lock' ':!.github/workflows/ci.yml' ':!.husky/pre-commit' ':!.agents/skills/*/references/*' 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "⚠️  Found potential secret pattern '$pattern' in:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "❌ Potential secrets found. Please review."
            exit 1
          fi
          echo "✅ No secrets detected."
